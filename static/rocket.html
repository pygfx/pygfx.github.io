<!doctype html>
<html>

<head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>RenderCanvas Pyodide example</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v314.0.2/full/pyodide.js"></script>
</head>

<body>
    <h3>The Rocket Game, in the browser, on Pyodide!</h3>
    <div id="canvas" class='renderview-wrapper has-titlebar is-resizable' style="width:800px; height:600px"
        style="background: #aaa;">
    </div>
    <br><br>

    <script type="text/javascript">
        async function main() {
            pythonCode = `

from rendercanvas.auto import RenderCanvas, loop
from rocket_game import RocketGame
import numpy as np

game = RocketGame()

canvas = RenderCanvas(update_mode="continuous")

ctx = canvas.get_bitmap_context()


@canvas.add_event_handler("key_down", "key_up")
def on_key(event: dict):
    is_down = event["event_type"] == "key_down"
    if event["key"] == "ArrowLeft":
        game.toggle_turn_left(is_down)
    if event["key"] == "ArrowRight":
        game.toggle_turn_right(is_down)
    if event["key"] == "ArrowUp":
        game.toggle_boost(is_down)
    if event["key"] == " ":
        game.toggle_shoot(is_down)


@canvas.request_draw
def animate():
    w, h = ctx.physical_size
    ratio = ctx.pixel_ratio

    game.set_world_size(w, h, ratio)
    game.auto_tick()
    canvas.set_title(f"Score: {game.score}")

    arr = np.zeros((h, w, 4), np.uint8)
    arr[:, :, 3] = 255

    s = max(2, int(8 * ratio))
    b = max(1, int(4 * ratio))

    x, y = game.ship.astype(int)
    arr[y - s : y + s, x - s : x + s] = (0, 255, 0, 255)

    for x, y in game.enemies.astype(int):
        arr[y - s : y + s, x - s : x + s] = (255, 0, 0, 255)

    for x, y in game.bullets.astype(int):
        arr[y - b : y + b, x - b : x + b] = (255, 255, 255, 255)

    for x, y, w in game.particles:
        x, y = int(x), int(y)
        arr[y - b : y + b, x - b : x + b] = (0, 255 * w, 255 * w, 255)

    ctx.set_bitmap(arr)


loop.run()

            `

            // Load Pyodide
            let pyodide = await loadPyodide();

            await pyodide.loadPackage("micropip");
            const micropip = pyodide.pyimport("micropip");
            await micropip.install('numpy');
            await micropip.install("rendercanvas");
            await micropip.install("rocket_game");

            // Run the Python code async
            pyodide.runPythonAsync(pythonCode);
        }
        main();
    </script>
</body>

</html>
